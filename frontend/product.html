<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details | Shopnest</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div id="navbarPlaceholder"></div>

  <div class="container" style="padding-top: 110px; padding-bottom: 60px;">

    <div id="loadingSpinner" class="loading-wrapper">
      <div class="spinner-gradient"></div>
    </div>

    <div id="productDetail" class="row g-5 d-none">
      <div class="col-md-6">
        <img id="productImage" src="" class="img-fluid rounded-xl w-100" style="max-height: 480px; object-fit: cover;"
          alt="" />
      </div>
      <div class="col-md-6">
        <span class="badge-category" id="productCategory"></span>
        <span class="badge bg-danger ms-2 d-none" id="discountBadge"></span>
        <h1 class="fw-bold mt-3" id="productName" style="font-size: 1.9rem;"></h1>
        <p class="text-muted mb-2" id="productBrand"></p>
        <div class="rating-stars mb-3 fs-5" id="productRating"></div>
        <div class="d-flex align-items-center gap-3 mb-4">
          <h3 class="price-tag mb-0" id="productPrice"></h3>
          <span class="text-muted text-decoration-line-through d-none" id="productOriginalPrice"></span>
        </div>
        <p class="text-muted" id="productDescription" style="line-height: 1.8;"></p>

        <div class="d-flex align-items-center gap-3 my-4">
          <span class="fw-semibold">Quantity:</span>
          <div class="qty-control">
            <button type="button" id="decreaseQty">-</button>
            <span id="qtyValue">1</span>
            <button type="button" id="increaseQty">+</button>
          </div>
          <span class="text-muted small" id="stockInfo"></span>
        </div>

        <div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-outline-gradient btn-lg px-4" id="addToCartBtn">
            <i class="bi bi-cart-plus me-2"></i> Add to Cart
          </button>
          <!-- Specifications Table -->
          <div class="mt-5">
            <h5 class="fw-bold mb-3">Specifications</h5>
            <table class="table table-borderless" id="specsTable">
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Reviews Section -->
      <div class="row mt-5 d-none" id="reviewsSection">
        <div class="col-12">
          <hr class="mb-4" />
          <h4 class="fw-bold mb-4"><i class="bi bi-star-half me-2"></i>Reviews (<span id="reviewCount">0</span>)</h4>

          <div class="mb-4" id="reviewFormWrapper">
            <form id="reviewForm">
              <div class="mb-2">
                <label class="form-label fw-semibold">Your Rating</label>
                <select class="form-select" id="reviewRating" style="max-width: 200px;" required>
                  <option value="">Select a rating</option>
                  <option value="5">5 - Excellent</option>
                  <option value="4">4 - Good</option>
                  <option value="3">3 - Average</option>
                  <option value="2">2 - Poor</option>
                  <option value="1">1 - Terrible</option>
                </select>
              </div>
              <div class="mb-3">
                <textarea class="form-control" id="reviewComment" rows="3"
                  placeholder="Share your experience with this product..." required></textarea>
              </div>
              <button type="submit" class="btn btn-gradient">
                <i class="bi bi-send me-1"></i> Submit Review
              </button>
            </form>
          </div>

          <div id="loginToReviewMsg" class="d-none alert alert-light border rounded-xl">
            <i class="bi bi-info-circle me-1"></i> <a href="login.html">Login</a> to leave a review.
          </div>

          <div id="reviewsList"></div>
        </div>
      </div>
    </div>
    <button class="btn btn-gradient btn-lg px-4" id="buyNowBtn">
      <i class="bi bi-lightning-charge-fill me-2"></i> Buy Now
    </button>
  </div>
  </div>
  </div>
  </div>

  <div id="footerPlaceholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/product.js"></script>
</body>

</html>
