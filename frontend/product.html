<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details | Shopnest</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="navbarPlaceholder"></div>

  <div class="container" style="padding-top: 110px; padding-bottom: 60px;">

    <div id="loadingSpinner" class="loading-wrapper">
      <div class="spinner-gradient"></div>
    </div>

    <div id="productDetail" class="row g-5 d-none">
      <div class="col-md-6">
        <img id="productImage" src="" class="img-fluid rounded-xl w-100" style="max-height: 480px; object-fit: cover;" alt="" />
      </div>
      <div class="col-md-6">
        <span class="badge-category" id="productCategory"></span>
        <h1 class="fw-bold mt-3" id="productName" style="font-size: 1.9rem;"></h1>
        <div class="rating-stars mb-3 fs-5" id="productRating"></div>
        <h3 class="price-tag mb-4" id="productPrice"></h3>
        <p class="text-muted" id="productDescription" style="line-height: 1.8;"></p>

        <div class="d-flex align-items-center gap-3 my-4">
          <span class="fw-semibold">Quantity:</span>
          <div class="qty-control">
            <button type="button" id="decreaseQty">-</button>
            <span id="qtyValue">1</span>
            <button type="button" id="increaseQty">+</button>
          </div>
          <span class="text-muted small" id="stockInfo"></span>
        </div>

        <button class="btn btn-gradient btn-lg px-5" id="addToCartBtn">
          <i class="bi bi-cart-plus me-2"></i> Add to Cart
        </button>
      </div>
    </div>
  </div>

  <div id="footerPlaceholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
