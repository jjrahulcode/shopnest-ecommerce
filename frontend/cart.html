<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Cart | Shopnest</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="navbarPlaceholder"></div>

  <div class="container" style="padding-top: 110px; padding-bottom: 60px;">
    <h2 class="section-title mb-4"><i class="bi bi-cart3 me-2"></i>My Cart</h2>

    <div id="loadingSpinner" class="loading-wrapper">
      <div class="spinner-gradient"></div>
    </div>

    <div class="row g-4 d-none" id="cartWrapper">
      <div class="col-lg-8">
        <div id="cartItemsContainer"></div>
      </div>
      <div class="col-lg-4">
        <div class="summary-card">
          <h5 class="fw-bold mb-4">Order Summary</h5>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Subtotal</span>
            <span id="subtotalAmount" class="fw-semibold"></span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Shipping</span>
            <span class="fw-semibold text-success">Free</span>
          </div>
          <hr />
          <div class="d-flex justify-content-between mb-4">
            <span class="fw-bold">Total</span>
            <span id="totalAmount" class="fw-bold price-tag"></span>
          </div>
          <a href="checkout.html" class="btn btn-gradient w-100 py-2">
            <i class="bi bi-credit-card me-1"></i> Proceed to Checkout
          </a>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state d-none">
      <i class="bi bi-cart-x"></i>
      <h5>Your cart is empty</h5>
      <p>Looks like you haven't added anything yet.</p>
      <a href="index.html" class="btn btn-gradient mt-2">Start Shopping</a>
    </div>
  </div>

  <div id="footerPlaceholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
