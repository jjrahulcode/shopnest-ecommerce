<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Shopnest</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div id="navbarPlaceholder"></div>

  <div class="container" style="padding-top: 110px; padding-bottom: 60px;">
    <h2 class="section-title mb-1">Welcome back, <span id="welcomeName" class="gradient-text"></span> 👋</h2>
    <p class="section-subtitle">Here's a quick overview of your account</p>

    <!-- Stat Cards -->
    <!-- Stat Cards -->
    <div class="row g-4 mb-5">
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon" style="background: linear-gradient(135deg,#06d6a0,#1b9aaa);"><i
              class="bi bi-wallet2"></i></div>
          <h3 id="walletBalance">₹0</h3>
          <p class="text-muted mb-0">Wallet Balance</p>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon"><i class="bi bi-receipt"></i></div>
          <h3 id="totalOrdersCount">0</h3>
          <p class="text-muted mb-0">Total Orders</p>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon" style="background: linear-gradient(135deg,#ff6b35,#f7931e);"><i
              class="bi bi-currency-dollar"></i></div>
          <h3 id="totalSpent">$0</h3>
          <p class="text-muted mb-0">Total Spent</p>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon" style="background: linear-gradient(135deg,#845ec2,#d65db1);"><i
              class="bi bi-cart3"></i></div>
          <h3 id="cartItemsCount">0</h3>
          <p class="text-muted mb-0">Items In Cart</p>
        </div>
      </div>
    </div>

    <!-- Profile Update -->
    <div class="row">
      <div class="col-lg-7">
        <div class="glass-panel">
          <h5 class="fw-bold mb-4">My Profile</h5>
          <form id="profileForm">
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" class="form-control" id="profileName" required />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" class="form-control" id="profileEmail" disabled />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Phone Number</label>
              <input type="text" class="form-control" id="profilePhone" placeholder="+1 555 123 4567" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Address</label>
              <textarea class="form-control" id="profileAddress" rows="2"
                placeholder="Your default shipping address"></textarea>
            </div>
            <button type="submit" class="btn btn-gradient w-100 py-2">
              <i class="bi bi-check-circle me-1"></i> Save Changes
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="footerPlaceholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
</body>

</html>
