<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Shopnest</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="navbarPlaceholder"></div>

  <div class="container" style="padding-top: 110px; padding-bottom: 60px; max-width: 700px;">
    <h2 class="section-title mb-4"><i class="bi bi-credit-card me-2"></i>Checkout</h2>

    <div id="loadingSpinner" class="loading-wrapper">
      <div class="spinner-gradient"></div>
    </div>

    <div class="glass-panel d-none" id="checkoutWrapper">
      <h5 class="fw-bold mb-3">Order Summary</h5>
      <div id="checkoutItemsList" class="mb-4"></div>
      <div class="d-flex justify-content-between mb-4">
        <span class="fw-bold">Total</span>
        <span id="checkoutTotal" class="fw-bold price-tag"></span>
      </div>

      <hr />

      <form id="checkoutForm" class="mt-4">
        <h5 class="fw-bold mb-3">Shipping Details</h5>
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Shipping Address</label>
          <textarea class="form-control" id="shippingAddress" rows="3" placeholder="Street, City, State, ZIP" required></textarea>
        </div>

        <div class="alert alert-light border rounded-xl small">
          <i class="bi bi-info-circle me-1"></i> This is a demo checkout — no real payment will be processed.
        </div>

        <button type="submit" class="btn btn-gradient w-100 py-2 mt-2" id="placeOrderBtn">
          <i class="bi bi-check-circle me-1"></i> Place Order
        </button>
      </form>
    </div>

    <div id="emptyState" class="empty-state d-none">
      <i class="bi bi-cart-x"></i>
      <h5>Your cart is empty</h5>
      <p>Add some products before checking out.</p>
      <a href="index.html" class="btn btn-gradient mt-2">Start Shopping</a>
    </div>
  </div>

  <div id="footerPlaceholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
