<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopnest | Modern Online Store</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="navbarPlaceholder"></div>

  <!-- Hero Section -->
  <section class="hero-section">
    <div class="container text-center">
      <h1>Shop Smarter. <br />Live Better.</h1>
      <p class="mx-auto" style="max-width: 600px;">
        Discover curated electronics, fashion, home goods, and more — all in one modern,
        easy-to-use store built for a smooth shopping experience.
      </p>
      <a href="#productsSection" class="btn btn-gradient btn-lg rounded-pill px-4 fw-semibold">
        <i class="bi bi-bag-check me-1"></i> Shop Now
      </a>
    </div>
  </section>

  <!-- Product Listing Section -->
  <section class="container py-5" id="productsSection">
    <div class="text-center">
      <h2 class="section-title">Our Products</h2>
      <p class="section-subtitle">Handpicked items across every category</p>
    </div>

    <!-- Search -->
    <div class="row justify-content-center mb-3">
      <div class="col-md-6">
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
          <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Search products..." />
        </div>
      </div>
    </div>

    <!-- Category Pills -->
    <div class="text-center mb-5" id="categoryPills"></div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-wrapper">
      <div class="spinner-gradient"></div>
    </div>

    <!-- Product Cards Grid -->
    <div class="row g-4" id="productsContainer"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state d-none">
      <i class="bi bi-emoji-frown"></i>
      <h5>No products found</h5>
      <p>Try a different search term or category.</p>
    </div>
  </section>

  <div id="footerPlaceholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
