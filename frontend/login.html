<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Shopnest</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="auth-wrapper">
    <div class="glass-panel" style="max-width: 440px; width: 100%;">
      <div class="text-center mb-4">
        <i class="bi bi-bag-heart-fill gradient-text" style="font-size: 2.5rem;"></i>
        <h3 class="mt-2 fw-bold">Welcome Back</h3>
        <p class="text-muted">Login to continue shopping</p>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-gradient w-100 py-2 mt-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-1"></i> Login
        </button>
      </form>

      <p class="text-center mt-4 mb-0">
        Don't have an account? <a href="signup.html" class="fw-semibold" style="color: var(--primary);">Sign Up</a>
      </p>
      <p class="text-center mt-2">
        <a href="index.html" class="text-muted small"><i class="bi bi-arrow-left"></i> Back to Home</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
